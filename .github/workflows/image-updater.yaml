name: Update board images
env:
  IMAGE_WIDTH: 2000
  IMAGE_HEIGHT: 2000
  IMAGE_ZOOM: 0.75
on:
  push:
    paths:
      - "**.kicad_pcb"
  pull_request:
    paths:
      - "**.kicad_pcb"
  workflow_dispatch:
jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install font
        run: |
          sudo apt install fonts-open-sans

      - name: Install KiCad
        run: |
          sudo add-apt-repository --yes ppa:kicad/kicad-10.0-releases
          sudo apt update
          sudo apt install kicad -y --no-install-recommends

      - name: Generate images
        run: |
          PCB_FILE=$(find . -maxdepth 1 -name "*.kicad_pcb" | head -1)
          kicad-cli pcb render "$PCB_FILE" \
          --output isometric_top.png \
          --quality high \
          --width $IMAGE_WIDTH \
          --height $IMAGE_HEIGHT \
          --zoom $IMAGE_ZOOM \
          --rotate 315,0,45
          kicad-cli pcb render "$PCB_FILE" \
          --output isometric_bottom.png \
          --quality high \
          --width $IMAGE_WIDTH \
          --height $IMAGE_HEIGHT \
          --zoom $IMAGE_ZOOM \
          --rotate 315,180,135

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add isometric_top.png isometric_bottom.png
          git commit -m "Update board images [${GITHUB_SHA::7}]"
          git push
